name: Deploy Client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Bingo
        working-directory: ./games/bingo
        env:
          GITHUB_PAGES: 'true'
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: |
          npm ci
          npm run build

      - name: Build 2048
        working-directory: ./games/2048
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build

      - name: Build Snake
        working-directory: ./games/snake
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build

      - name: Build Sudoku
        working-directory: ./games/sudoku
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build

      - name: Build Sliding Puzzle
        working-directory: ./games/sliding-puzzle
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm ci
          npm run build

      - name: Assemble dist-pages
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: |
          mkdir -p dist-pages/bingo dist-pages/2048 dist-pages/snake dist-pages/sudoku dist-pages/slides
          cp -r games/bingo/dist/* dist-pages/bingo/
          cp -r games/2048/dist/* dist-pages/2048/
          cp -r games/snake/dist/* dist-pages/snake/
          cp -r games/sudoku/dist/* dist-pages/sudoku/
          cp -r games/sliding-puzzle/dist/* dist-pages/slides/
          cp landing/index.html dist-pages/index.html
          sed -i "s|__SERVER_URL__|$VITE_SERVER_URL|g" dist-pages/index.html
          echo 'games.arivalan.in' > dist-pages/CNAME
          cp dist-pages/index.html dist-pages/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
