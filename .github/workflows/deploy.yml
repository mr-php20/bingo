name: Deploy Client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Build
        env:
          GITHUB_PAGES: 'true'
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
        run: npm run build

      - name: Restructure for /bingo/ subpath
        run: |
          mkdir -p dist-pages/bingo
          cp -r dist/* dist-pages/bingo/
          echo 'games.arivalan.in' > dist-pages/CNAME
          cat > dist-pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/bingo/">
            <title>Redirecting…</title>
          </head>
          <body>
            <p>Redirecting to <a href="/bingo/">Bingo</a>…</p>
          </body>
          </html>
          EOF
          cp dist-pages/bingo/404.html dist-pages/404.html 2>/dev/null || cp dist-pages/index.html dist-pages/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
