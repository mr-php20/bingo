services:
  - type: web
    name: bingo-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        sync: false # Set to: https://games.arivalan.in,https://mr-php20.github.io
